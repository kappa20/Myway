# Ansible inventory for Myway DevOps project
# After running "terraform apply", replace the placeholders below with the
# actual IPs shown in "terraform output":
#
#   master_public_ip = "X.X.X.X"
#   worker_public_ip = "Y.Y.Y.Y"

[master]
k8s-master ansible_host=<MASTER_PUBLIC_IP> ansible_user=ec2-user

[workers]
k8s-worker ansible_host=<WORKER_PUBLIC_IP> ansible_user=ec2-user

# All hosts group
[all:vars]
ansible_python_interpreter=/usr/bin/python3.8
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Kubernetes specific variables
k8s_version=1.29.0
pod_network_cidr=10.244.0.0/16
