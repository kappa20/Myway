[defaults]
# Disable host key checking to avoid SSH prompts during automation
host_key_checking = False

# Specify the inventory file
inventory = inventory.ini

# Default SSH user for AWS EC2 Linux instances
remote_user = ec2-user

# Path to the private SSH key
# Update this to point to your actual private key
private_key_file = ~/.ssh/id_rsa

# Increase timeout for initial SSH connection
timeout = 30

# Number of parallel processes
forks = 5

# Gather facts from hosts
gather_facts = True

# Python interpreter on managed hosts
interpreter_python = auto

[inventory]
enable_plugins = ini

[ssh_connection]
# SSH control path optimization
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
pipelining = True
