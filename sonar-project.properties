# ═══════════════════════════════════════════════════════════════════
# SonarCloud – Configuration projet Myway
# Fichier à placer à la racine du projet : sonar-project.properties
#
# Prérequis :
#   1. Créer un compte sur https://sonarcloud.io (gratuit pour les projets publics)
#   2. Importer le repo GitHub dans SonarCloud
#   3. Récupérer le SONAR_TOKEN et l'ajouter dans GitHub Secrets
#   4. Remplacer myway-project-key et myway-org-key ci-dessous
# ═══════════════════════════════════════════════════════════════════

# ── Identification ──────────────────────────────────────────────────
sonar.projectKey=Myway
sonar.organization=kappa20
sonar.projectName=Myway – Student Module Manager
sonar.projectVersion=1.0

# ── Sources ─────────────────────────────────────────────────────────
# On analyse le backend ET le frontend dans le même scan
sonar.sources=backend/,frontend/src/
sonar.tests=backend/tests/

# ── Exclusions ──────────────────────────────────────────────────────
# On exclut les fichiers non pertinents pour l'analyse qualité
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/coverage/**,\
  backend/database/seed.js,\
  backend/database/demoData.js,\
  frontend/public/**,\
  **/*.test.js,\
  **/*.spec.js

# ── Tests & couverture ───────────────────────────────────────────────
sonar.test.inclusions=backend/tests/**/*.test.js
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# ── Langue ──────────────────────────────────────────────────────────
sonar.language=js
sonar.javascript.node.maxspace=4096

# ── Quality Gate ────────────────────────────────────────────────────
# Le Quality Gate par défaut de SonarCloud bloque si :
#   - Coverage < 80% sur le nouveau code
#   - Duplicated Lines > 3%
#   - Maintainability Rating < A
#   - Reliability Rating < A
#   - Security Rating < A
#   - Security Hotspots Reviewed < 100%
# Ces seuils peuvent être configurés sur l'interface SonarCloud

# ── Règles de sécurité activées ─────────────────────────────────────
# SonarCloud analyse automatiquement :
#   • Injections SQL
#   • XSS (Cross-Site Scripting)
#   • Exposition de secrets dans le code
#   • Utilisation de fonctions dangereuses (eval, etc.)
#   • Dépendances vulnérables
#   • Mauvaises pratiques Express.js

# ── Liens (optionnel) ────────────────────────────────────────────────
sonar.links.homepage=https://github.com/kappa20/myway
sonar.links.ci=https://github.com/kappa20/myway/actions
sonar.links.issue=https://github.com/kappa20/myway/issues
