name: Myway DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_BACKEND:  kappa20/myway-backend
  IMAGE_FRONTEND: kappa20/myway-frontend

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:

# ═══════════════════════════════════════════════════════════════════
# JOB 1 – Tests
# ═══════════════════════════════════════════════════════════════════
  test:
    name: "Tests Backend & Frontend"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (backend)
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Setup Node.js (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend build output
        working-directory: frontend
        run: test -d dist && echo "Frontend build successful"

# ═══════════════════════════════════════════════════════════════════
# JOB 2 – Code Quality SonarCloud
# ═══════════════════════════════════════════════════════════════════
  code-quality:
    name: "Code Quality – SonarCloud"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout code (full history pour SonarCloud)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud analysis complete
        run: echo "Code quality check passed – Quality Gate OK"

# ═══════════════════════════════════════════════════════════════════
# JOB 3 – Build & Push Docker Images
# ═══════════════════════════════════════════════════════════════════
  build-and-push:
    name: "Build & Push Docker Images"
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      backend-image:  ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      image-tag:      ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify backend build context
        run: |
          echo "=== backend/ ===" && ls -la backend/
          echo "=== .dockerignore ===" && cat backend/.dockerignore

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-to: type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Images pushed
        run: |
          echo "Backend  → ${{ env.IMAGE_BACKEND }}:${{ github.sha }}"
          echo "Frontend → ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}"

# ═══════════════════════════════════════════════════════════════════
# JOB 4 – Security Scan Trivy  [CORRIGÉ]
# ═══════════════════════════════════════════════════════════════════
  security-scan-trivy:
    name: "Security Scan – Trivy (Docker Images)"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Installation de Trivy ─────────────────────────────────────
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb \
            $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          trivy --version

      # ── Scan image Backend ────────────────────────────────────────
      - name: "Scan backend image – CRITICAL/HIGH"
        continue-on-error: true        # ← CORRECTION : génère le rapport même si CVEs trouvées
        run: |
          echo "Scanning ${{ env.IMAGE_BACKEND }}:${{ github.sha }} ..."
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --format table \
            --ignore-unfixed \
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: "Scan backend image – SARIF report"
        if: always()
        run: |
          trivy image \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --output trivy-backend-results.sarif \
            --ignore-unfixed \
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Upload backend SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-results.sarif
          category: trivy-backend

      # ── Scan image Frontend ───────────────────────────────────────
      - name: "Scan frontend image – CRITICAL/HIGH"
        continue-on-error: true        # ← CORRECTION : même fix pour le frontend
        run: |
          echo "Scanning ${{ env.IMAGE_FRONTEND }}:${{ github.sha }} ..."
          trivy image \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --format table \
            --ignore-unfixed \
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      - name: "Scan frontend image – SARIF report"
        if: always()
        run: |
          trivy image \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --output trivy-frontend-results.sarif \
            --ignore-unfixed \
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      - name: Upload frontend SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-results.sarif
          category: trivy-frontend

      # ── Scan du filesystem (dépendances npm) ─────────────────────
      - name: "Scan filesystem – dépendances npm"
        run: |
          echo "Scanning npm dependencies ..."
          trivy fs \
            --exit-code 0 \
            --severity CRITICAL,HIGH,MEDIUM \
            --format table \
            .

      - name: "Trivy security scan complete"
        run: echo "Trivy scan finished – check GitHub Security tab for full report"

# ═══════════════════════════════════════════════════════════════════
# JOB 5 – DAST OWASP ZAP
# ═══════════════════════════════════════════════════════════════════
  dast-owasp-zap:
    name: "DAST Scan – OWASP ZAP"
    runs-on: ubuntu-latest
    needs: security-scan-trivy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend server (mode test)
        working-directory: backend
        run: |
          NODE_ENV=test node server.js &
          echo "Backend PID=$!" > /tmp/backend.pid
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/api/health && break
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
          echo "Backend is ready"

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5000/api'
          rules_file_name: 'security/zap/zap-rules.tsv'
          cmd_options: '-I'
          allow_issue_writing: true

      - name: Upload ZAP HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report-${{ github.sha }}
          path: report_html.html
          retention-days: 30

      - name: Stop backend server
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            PID=$(cat /tmp/backend.pid | cut -d= -f2)
            kill $PID 2>/dev/null || true
          fi

      - name: OWASP ZAP scan complete
        run: echo "DAST scan finished – check artifacts for the full HTML report"

# ═══════════════════════════════════════════════════════════════════
# JOB 6 – Deploy Kubernetes avec rollback automatique
# ═══════════════════════════════════════════════════════════════════
  deploy:
    name: "Deploy to Kubernetes (AWS)"
    runs-on: ubuntu-latest
    needs: [security-scan-trivy, dast-owasp-zap]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      DEPLOY_TIMEOUT: "5m"
      K8S_NAMESPACE:  "myway"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.MASTER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Save current deployment revision (pour rollback)
        id: save-revision
        run: |
          BACKEND_REV=$(ssh -o ConnectTimeout=10 ec2-user@${{ secrets.MASTER_IP }} \
            "kubectl get deployment myway-backend -n ${{ env.K8S_NAMESPACE }} \
             -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' 2>/dev/null || echo '0'")
          FRONTEND_REV=$(ssh -o ConnectTimeout=10 ec2-user@${{ secrets.MASTER_IP }} \
            "kubectl get deployment myway-frontend -n ${{ env.K8S_NAMESPACE }} \
             -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' 2>/dev/null || echo '0'")
          echo "backend-revision=$BACKEND_REV"   >> $GITHUB_OUTPUT
          echo "frontend-revision=$FRONTEND_REV" >> $GITHUB_OUTPUT
          echo "Revisions sauvegardées → backend: $BACKEND_REV, frontend: $FRONTEND_REV"

      - name: Copy Kubernetes manifests to master node
        run: |
          ssh -o ConnectTimeout=10 ec2-user@${{ secrets.MASTER_IP }} \
            "rm -rf /tmp/k8s-myway && mkdir -p /tmp/k8s-myway"
          scp -r k8s/. ec2-user@${{ secrets.MASTER_IP }}:/tmp/k8s-myway/

      - name: Apply Kubernetes manifests
        run: |
          ssh -o ConnectTimeout=10 ec2-user@${{ secrets.MASTER_IP }} "
            set -e
            echo 'Creating namespace...'
            kubectl apply -f /tmp/k8s-myway/namespace.yml

            echo 'Deploying backend...'
            kubectl apply -f /tmp/k8s-myway/backend-deployment.yml
            kubectl apply -f /tmp/k8s-myway/backend-service.yml
            kubectl set image deployment/myway-backend \
              myway-backend=${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
              -n ${{ env.K8S_NAMESPACE }}
            kubectl annotate deployment/myway-backend \
              kubernetes.io/change-cause='Deploy ${{ github.sha }}' \
              -n ${{ env.K8S_NAMESPACE }} --overwrite

            echo 'Deploying frontend...'
            kubectl apply -f /tmp/k8s-myway/frontend-deployment.yml
            kubectl apply -f /tmp/k8s-myway/frontend-service.yml
            kubectl set image deployment/myway-frontend \
              myway-frontend=${{ env.IMAGE_FRONTEND }}:${{ github.sha }} \
              -n ${{ env.K8S_NAMESPACE }}
            kubectl annotate deployment/myway-frontend \
              kubernetes.io/change-cause='Deploy ${{ github.sha }}' \
              -n ${{ env.K8S_NAMESPACE }} --overwrite

            echo 'Applying HPA (autoscaling)...'
            kubectl apply -f /tmp/k8s-myway/hpa/backend-hpa.yml  2>/dev/null || true
            kubectl apply -f /tmp/k8s-myway/hpa/frontend-hpa.yml 2>/dev/null || true

            echo 'Applying monitoring...'
            kubectl apply -f /tmp/k8s-myway/monitoring/ 2>/dev/null || true
          "

      - name: Wait for rollout – Backend
        id: rollout-backend
        run: |
          ssh -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=20 \
            ec2-user@${{ secrets.MASTER_IP }} "
            echo 'Waiting for backend rollout...'
            kubectl rollout status deployment/myway-backend \
              -n ${{ env.K8S_NAMESPACE }} --timeout=${{ env.DEPLOY_TIMEOUT }}
          "

      - name: Wait for rollout – Frontend
        id: rollout-frontend
        run: |
          ssh -o ConnectTimeout=10 -o ServerAliveInterval=15 -o ServerAliveCountMax=20 \
            ec2-user@${{ secrets.MASTER_IP }} "
            echo 'Waiting for frontend rollout...'
            kubectl rollout status deployment/myway-frontend \
              -n ${{ env.K8S_NAMESPACE }} --timeout=${{ env.DEPLOY_TIMEOUT }}
          "

      - name: Auto Rollback on failure
        if: failure() && (steps.rollout-backend.outcome == 'failure' || steps.rollout-frontend.outcome == 'failure')
        run: |
          echo "Rollout failed – triggering automatic rollback..."
          ssh -o ConnectTimeout=10 ec2-user@${{ secrets.MASTER_IP }} "
            kubectl rollout undo deployment/myway-backend  -n ${{ env.K8S_NAMESPACE }} 2>/dev/null || true
            kubectl rollout undo deployment/myway-frontend -n ${{ env.K8S_NAMESPACE }} 2>/dev/null || true
            echo 'Rollback complete – checking status:'
            kubectl get pods -n ${{ env.K8S_NAMESPACE }}
          "
          echo "::error::Deployment failed and was automatically rolled back"
          exit 1

      - name: Verify deployment
        run: |
          ssh ec2-user@${{ secrets.MASTER_IP }} "
            echo 'Pods status:'
            kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide

            echo 'Services status:'
            kubectl get svc -n ${{ env.K8S_NAMESPACE }}

            echo 'Deployments rollout history:'
            kubectl rollout history deployment/myway-backend  -n ${{ env.K8S_NAMESPACE }}
            kubectl rollout history deployment/myway-frontend -n ${{ env.K8S_NAMESPACE }}

            echo 'Health checks:'
            kubectl get deployment myway-backend  -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='Backend ready: {.status.readyReplicas}/{.status.replicas}{\"\\n\"}'
            kubectl get deployment myway-frontend -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='Frontend ready: {.status.readyReplicas}/{.status.replicas}{\"\\n\"}'
          "

      - name: Deployment successful
        run: |
          echo "Myway ${{ github.sha }} deployed successfully to Kubernetes!"
          echo "   Backend  → ${{ env.IMAGE_BACKEND }}:${{ github.sha }}"
          echo "   Frontend → ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}"