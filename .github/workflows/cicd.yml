name: Myway CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_BACKEND: kappa20/myway-backend
  IMAGE_FRONTEND: kappa20/myway-frontend

jobs:
  # ═════════════════════════════════════════════════════════════════
  # JOB 1: Test
  # ═════════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "backend/package-lock.json"

      # ─────────────────────────────────────────────────────────────
      # Backend Tests
      # ─────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      # ─────────────────────────────────────────────────────────────
      # Frontend Tests
      # ─────────────────────────────────────────────────────────────
      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend build output
        working-directory: frontend
        run: test -d dist && echo "Frontend build successful"

  # ═════════════════════════════════════════════════════════════════
  # JOB 2: Build and Push Docker Images
  # ═════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─────────────────────────────────────────────────────────────
      # Build and Push Backend
      # ─────────────────────────────────────────────────────────────
      - name: Debug - verify backend build context
        run: |
          echo "=== backend/ root ===" && ls -la backend/
          echo "=== backend/database/ ===" && ls -la backend/database/ || echo "MISSING: database/ dir"
          echo "=== .dockerignore ===" && cat backend/.dockerignore

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          no-cache: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-to: type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache,mode=max

      - name: Backend image pushed
        run: echo "Backend image pushed to ${{ env.IMAGE_BACKEND }}:latest"

      # ─────────────────────────────────────────────────────────────
      # Build and Push Frontend
      # ─────────────────────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_FRONTEND }}:buildcache,mode=max

      - name: Frontend image pushed
        run: echo "Frontend image pushed to ${{ env.IMAGE_FRONTEND }}:latest"

  # ═════════════════════════════════════════════════════════════════
