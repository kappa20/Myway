# ── Grafana Secret ────────────────────────────────────────────────
# Before applying this file, create the secret with your own password:
#
#   kubectl create secret generic grafana-secret \
#     --from-literal=admin-password='<YOUR_STRONG_PASSWORD>' \
#     -n myway
#
# The password is NOT stored in this file.
# Do NOT add a Secret manifest with a real password to git.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: myway
  labels:
    app: grafana
    component: monitoring
    project: myway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        component: monitoring
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: web
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_INSTALL_PLUGINS
              value: "grafana-clock-panel"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: myway
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
      nodePort: 30030
