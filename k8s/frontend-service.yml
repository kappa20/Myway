apiVersion: v1
kind: Service
metadata:
  name: myway-frontend
  namespace: myway
  labels:
    app: myway-frontend
    component: frontend
    project: myway
  annotations:
    description: "Myway Frontend Web Application"
spec:
  type: NodePort
  selector:
    app: myway-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
  sessionAffinity: None
