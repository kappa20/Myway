apiVersion: apps/v1
kind: Deployment
metadata:
  name: myway-frontend
  namespace: myway
  labels:
    app: myway-frontend
    component: frontend
    project: myway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: myway-frontend
  template:
    metadata:
      labels:
        app: myway-frontend
        component: frontend
        project: myway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/metrics"
    spec:
      restartPolicy: Always
      serviceAccountName: default

      containers:
        - name: myway-frontend
          image: kappa20/myway-frontend:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          env:
            - name: BACKEND_URL
              value: "http://myway-backend:5000"

          # Health checks
          livenessProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 2

          # Resource requests and limits
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
